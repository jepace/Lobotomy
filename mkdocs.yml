site_name: Wiki
site_description: Personal knowledge base maintained by LLMs
docs_dir: wiki
site_dir: site
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - search.highlight
    - search.suggest

plugins:
  - search:
      lang: en

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list
  - admonition

extra:
  generator: false
