{% extends "base.html" %}
{% block title %}{% if slug %}Edit Post{% else %}New Post{% endif %} — Blog{% endblock %}

{% block head %}
<style>
  .editor-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--nav-h) - var(--safe-top) - var(--safe-bottom));
    overflow: hidden;
  }
  .editor-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 8px;
  }
  .editor-topbar h1 { font-size: 17px; font-weight: 600; flex: 1; }
  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 16px 24px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
  .body-textarea { min-height: 220px; font-family: "SF Mono", "Fira Code", monospace; font-size: 14px; }
  .publish-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .publish-row input[type=checkbox] { width: 18px; height: 18px; flex-shrink: 0; }
  .publish-row label { font-size: 15px; margin: 0; }
  .error-msg { background: #ff3b3022; color: var(--danger); padding: 10px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; }
</style>
{% endblock %}

{% block body %}
<div class="editor-wrap">
  <div class="editor-topbar">
    <a href="/blog/" class="btn btn-ghost btn-sm">Cancel</a>
    <h1>{% if slug %}Edit Post{% else %}New Post{% endif %}</h1>
    <button form="post-form" type="submit" class="btn btn-primary btn-sm">Save</button>
  </div>

  <div class="editor-scroll">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form id="post-form" method="post">
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ post.title if post else '' }}"
               placeholder="Post title" required>
      </div>

      <div class="field">
        <label for="summary">Summary <span style="font-weight:400">(shown in RSS and listing)</span></label>
        <input type="text" id="summary" name="summary" value="{{ post.summary if post else '' }}"
               placeholder="One-line description">
      </div>

      <div class="field">
        <label for="tags">Tags <span style="font-weight:400">(comma-separated)</span></label>
        <input type="text" id="tags" name="tags" value="{{ post.tags if post else '' }}"
               placeholder="e.g. wiki, llm, thoughts">
      </div>

      <div class="field">
        <label for="body">Content <span style="font-weight:400">(Markdown)</span></label>
        <textarea id="body" name="body" class="body-textarea"
                  placeholder="Write in Markdown…">{{ post.body if post else '' }}</textarea>
      </div>

      <div class="publish-row">
        <input type="checkbox" id="published" name="published"
               {% if post and post.published %}checked{% endif %}>
        <label for="published">Published (visible publicly)</label>
      </div>
    </form>
  </div>
</div>
{% endblock %}
