{% extends "auth_base.html" %}
{% block title %}New Password — Wiki{% endblock %}
{% block heading %}New Password{% endblock %}
{% block content %}

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">
  <div class="field">
    <label for="password">New password (min 10 characters)</label>
    <input id="password" name="password" type="password"
           autocomplete="new-password" minlength="10" required autofocus>
  </div>
  <div class="field">
    <label for="password2">Confirm new password</label>
    <input id="password2" name="password2" type="password"
           autocomplete="new-password" minlength="10" required>
  </div>
  <button class="btn" type="submit">Set New Password</button>
</form>

<div class="links"><a href="/auth/login">Back to sign in</a></div>

{% endblock %}
