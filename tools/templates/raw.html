{% extends "base.html" %}
{% block title %}{{ title }} — Raw{% endblock %}
{% block head %}
<style>
  .raw-page {
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  .raw-page h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
  }
  .raw-content {
    color: var(--text);
    line-height: 1.65;
    font-size: 15px;
  }
  .raw-content h1, .raw-content h2, .raw-content h3,
  .raw-content h4, .raw-content h5, .raw-content h6 {
    font-weight: 700;
    margin-top: 24px;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .raw-content h1 { font-size: 24px; }
  .raw-content h2 { font-size: 20px; }
  .raw-content h3 { font-size: 18px; }
  .raw-content h4 { font-size: 16px; }
  .raw-content h5 { font-size: 15px; }
  .raw-content h6 { font-size: 14px; }
  .raw-content p {
    margin-bottom: 16px;
  }
  .raw-content a {
    color: var(--accent);
    text-decoration: underline;
  }
  .raw-content a:visited {
    color: var(--accent);
    opacity: 0.8;
  }
  .raw-content ul, .raw-content ol {
    margin-bottom: 16px;
    padding-left: 24px;
  }
  .raw-content li {
    margin-bottom: 6px;
  }
  .raw-content blockquote {
    border-left: 3px solid var(--border);
    margin: 16px 0;
    padding-left: 16px;
    color: var(--text2);
    font-style: italic;
  }
  .raw-content code {
    background: var(--bg2);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Monaco', 'Courier New', monospace;
    font-size: 13px;
  }
  .raw-content pre {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin-bottom: 16px;
  }
  .raw-content pre code {
    background: none;
    padding: 0;
  }
  .raw-meta {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
</style>
{% endblock %}

{% block body %}
<div class="page">
<div class="raw-page">
  <h1>{{ title }}</h1>
  <div class="raw-meta">{{ filename }}</div>
  <div class="raw-content">
    {{ content|safe }}
  </div>
</div>
</div>
{% endblock %}
