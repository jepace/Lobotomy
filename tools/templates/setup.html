<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set up Lobotomy</title>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --text: #1c1c1e; --text2: #6c6c70;
      --accent: #007aff; --border: #d1d1d6; --danger: #ff3b30;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #000; --bg2: #1c1c1e; --text: #f2f2f7; --text2: #8e8e93;
              --accent: #0a84ff; --border: #38383a; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: var(--bg2); border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 380px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text2);
            text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 16px; margin-bottom: 16px;
      font-family: inherit; outline: none; -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; padding: 13px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px;
    }
    .error {
      background: #ff3b3022; color: var(--danger);
      border-radius: 8px; padding: 10px 14px;
      font-size: 14px; margin-bottom: 16px;
    }
    .hint { color: var(--text2); font-size: 13px; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to Lobotomy</h1>
    <p class="subtitle">Create your account to get started. This can only be done once.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ email or '' }}"
             placeholder="you@example.com" autocomplete="email" autofocus required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Choose a strong password" autocomplete="new-password" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm"
             placeholder="Repeat password" autocomplete="new-password" required>

      <button type="submit" class="btn">Create Account</button>
    </form>

    <p class="hint">No password is stored in config files. Your credentials are hashed and kept in the data directory.</p>
  </div>
</body>
</html>
