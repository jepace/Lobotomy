<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Wiki{% endblock %}</title>
  <style>
    :root {
      --bg:     #ffffff; --bg2: #f5f5f7; --text: #1c1c1e; --text2: #6c6c70;
      --accent: #007aff; --border: #d1d1d6; --danger: #ff3b30;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000; --bg2: #1c1c1e; --text: #f2f2f7; --text2: #8e8e93;
        --accent: #0a84ff; --border: #38383a;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px env(safe-area-inset-bottom);
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--bg2);
      border-radius: 18px;
      padding: 32px 24px;
    }
    .logo {
      text-align: center;
      font-size: 40px;
      margin-bottom: 6px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
    input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      display: block; width: 100%;
      padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 20px;
      -webkit-tap-highlight-color: transparent;
    }
    .error {
      background: #ff3b3018;
      border: 1px solid #ff3b3044;
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .message {
      background: #34c75918;
      border: 1px solid #34c75944;
      color: #1a8a3a;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    @media (prefers-color-scheme: dark) {
      .message { color: #34c759; }
    }
    .links {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: var(--text2);
    }
    .links a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧠</div>
    <h1>{% block heading %}Wiki{% endblock %}</h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
