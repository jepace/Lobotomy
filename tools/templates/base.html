<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>{% block title %}Wiki{% endblock %}</title>
  <style>
    :root {
      --bg:          #ffffff;
      --bg2:         #f5f5f7;
      --bg3:         #ebebed;
      --text:        #1c1c1e;
      --text2:       #6c6c70;
      --accent:      #007aff;
      --accent-dark: #0051a8;
      --border:      #d1d1d6;
      --danger:      #ff3b30;
      --success:     #34c759;
      --warn-bg:     #fff3cd;
      --user-bg:     #007aff;
      --user-fg:     #ffffff;
      --ai-bg:       #f0f0f5;
      --ai-fg:       #1c1c1e;
      --tool-bg:     #f8f8fa;
      --nav-h:       56px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top:    env(safe-area-inset-top, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #000000;
        --bg2:       #1c1c1e;
        --bg3:       #2c2c2e;
        --text:      #f2f2f7;
        --text2:     #8e8e93;
        --accent:    #0a84ff;
        --border:    #38383a;
        --warn-bg:   #3a3000;
        --user-bg:   #0a84ff;
        --ai-bg:     #2c2c2e;
        --ai-fg:     #f2f2f7;
        --tool-bg:   #1c1c1e;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: var(--safe-top);
    }
    /* ── Main content ────────────────────────────────────────── */
    .page {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
    }
    /* ── Bottom nav ──────────────────────────────────────────── */
    .nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 200;
    }
    .nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding-bottom: var(--safe-bottom);
      text-decoration: none;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    .nav a.active { color: var(--accent); }
    .nav a svg { width: 24px; height: 24px; }
    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-ghost    { background: var(--bg3); color: var(--text); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-sm       { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
    /* ── Form controls ───────────────────────────────────────── */
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      font-family: inherit;
      line-height: 1.4;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    textarea:focus { border-color: var(--accent); }
    /* ── Cards / list items ──────────────────────────────────── */
    .card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 0 16px 10px;
    }
    .section-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 18px 16px 6px;
    }
    /* ── Priority badges ─────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-top    { background: #ff3b3022; color: #ff3b30; }
    .badge-high   { background: #ff950022; color: #ff9500; }
    .badge-medium { background: #007aff22; color: var(--accent); }
    .badge-low    { background: var(--bg3); color: var(--text2); }
    /* ── Utility ─────────────────────────────────────────────── */
    .text2    { color: var(--text2); }
    .text-sm  { font-size: 13px; }
    .mt-1     { margin-top: 4px; }
    .mt-2     { margin-top: 10px; }
    .flex     { display: flex; }
    .flex-1   { flex: 1; }
    .gap-2    { gap: 8px; }
    .items-center { align-items: center; }
    /* ── Wiki content styles ─────────────────────────────────── */
    .wiki-content { padding: 16px; max-width: 700px; }
    .wiki-content h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .wiki-content h2 { font-size: 20px; font-weight: 600; margin: 20px 0 8px; }
    .wiki-content h3 { font-size: 17px; font-weight: 600; margin: 16px 0 6px; }
    .wiki-content p  { margin-bottom: 12px; }
    .wiki-content ul, .wiki-content ol { padding-left: 22px; margin-bottom: 12px; }
    .wiki-content li { margin-bottom: 4px; }
    .wiki-content a  { color: var(--accent); text-decoration: none; }
    .wiki-content a:hover { text-decoration: underline; }
    .wiki-content code {
      background: var(--bg3);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 14px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .wiki-content pre {
      background: var(--bg3);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .wiki-content pre code { background: none; padding: 0; }
    .wiki-content table { border-collapse: collapse; width: 100%; margin-bottom: 12px; font-size: 14px; }
    .wiki-content th, .wiki-content td { border: 1px solid var(--border); padding: 7px 10px; text-align: left; }
    .wiki-content th { background: var(--bg2); font-weight: 600; }
    .wiki-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .wiki-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <nav class="nav">
    {% if current_user %}
    <form method="post" action="/auth/logout" style="display:none" id="logout-form"></form>
    {% endif %}
    <a href="/chat" {% if active == 'chat' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
    </a>
    <a href="/wiki/" {% if active == 'wiki' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Wiki
    </a>
    <a href="/tasks" {% if active == 'tasks' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Tasks
    </a>
    <a href="/inbox" {% if active == 'inbox' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </svg>
      Inbox
    </a>
    <a href="/blog/" {% if active == 'blog' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Blog
    </a>
    {% if current_user %}
    <a href="#" onclick="document.getElementById('logout-form').submit();return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </a>
    {% endif %}
  </nav>
</body>
</html>
