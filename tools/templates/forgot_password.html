{% extends "auth_base.html" %}
{% block title %}Reset Password — Wiki{% endblock %}
{% block heading %}Reset Password{% endblock %}
{% block content %}

{% if message %}
<div class="message">{{ message }}</div>
{% else %}
<p style="color:var(--text2); font-size:14px; margin-bottom:20px;">
  Enter your email address and we'll send you a reset link.
</p>
<form method="post">
  <div class="field">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="email"
           inputmode="email" required autofocus>
  </div>
  <button class="btn" type="submit">Send Reset Link</button>
</form>
{% endif %}

<div class="links"><a href="/auth/login">Back to sign in</a></div>

{% endblock %}
